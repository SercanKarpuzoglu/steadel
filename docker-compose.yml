services:
  app:
    build:
      context: .
      target: app
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://steadel:${POSTGRES_PASSWORD:-steadel}@postgres:5432/steadel
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    expose:
      - "3000"

  worker:
    build:
      context: .
      target: worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://steadel:${POSTGRES_PASSWORD:-steadel}@postgres:5432/steadel
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  migrate:
    build:
      context: .
      target: worker
    env_file: .env
    environment:
      DATABASE_URL: postgres://steadel:${POSTGRES_PASSWORD:-steadel}@postgres:5432/steadel
    command: ["pnpm", "db:migrate"]
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: steadel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-steadel}
      POSTGRES_DB: steadel
    # Host binding is for local development tooling only (localhost-only).
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steadel"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--maxmemory-policy", "noeviction"]
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-56379}:6379"
    volumes:
      - redisdata:/data

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - app

  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    volumes:
      - kumadata:/app/data
    expose:
      - "3001"

volumes:
  pgdata:
  redisdata:
  caddydata:
  caddyconfig:
  kumadata:
